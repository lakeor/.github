name: lint

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "20"
        required: false
  pull_request:
  push:
    branches: [dev, main]

jobs:
  spell:
    name: cspell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # `inputs` is empty on direct push/PR triggers, so fall back to 20.
          node-version: ${{ inputs.node-version || '20' }}
      - name: Run cspell
        run: |
          if [ -f cspell.json ]; then
            # --no-must-find-files: don't fail when a glob (e.g. *.rs)
            # matches nothing in a docs-only repo.
            npx --yes cspell --no-progress --no-must-find-files "**/*.md" "**/*.rs" "**/*.ts"
          else
            echo "no cspell.json — skipping"
          fi

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"
