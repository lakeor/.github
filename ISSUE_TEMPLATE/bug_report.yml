name: Bug report
description: Report something that isn't working
title: "bug: <short description>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please fill in as much as you can — it makes
        triage much faster.
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `make version` or the git SHA you reproduced on.
      placeholder: "0.1.0 / commit abc1234"
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - starlake-rte (runtime)
        - starlake-mcp
        - starlake-cli
        - starlake-admin
        - starlake-browser
        - starlake-compose
        - starlake-cluster
        - starlake-nomad
        - starlake-deploy
        - starlake-workbench
        - other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal commands or a code snippet.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, container runtime, Rust/Node version, deployment target.
      placeholder: |
        - OS: Ubuntu 24.04
        - Docker: 27.3
        - Rust: 1.85
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      render: shell
    validations:
      required: false
