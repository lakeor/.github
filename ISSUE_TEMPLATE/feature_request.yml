name: Feature request
description: Propose a new feature or enhancement
title: "feat: <short description>"
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should we build / change? Sketches and pseudo-code welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - starlake-rte (runtime)
        - starlake-mcp
        - starlake-cli
        - starlake-admin
        - starlake-browser
        - starlake-compose
        - starlake-cluster
        - starlake-nomad
        - starlake-deploy
        - starlake-workbench
        - other
    validations:
      required: true
  - type: checkboxes
    id: contribute
    attributes:
      label: Would you like to help implement this?
      options:
        - label: I would like to open a PR for this
